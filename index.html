<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Single:wght@100..900&family=Oi&display=swap" rel="stylesheet">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Playground</title>
    <meta name="description" content="A playful HTML playground project." />
  </head>
  <body>
    <link rel="stylesheet" href="styles.css">
    <h1 class="chonk">Welcome to HTML Playground</h1>
    <div class="grid"> 
      <div class="button">
        <p class="smol" onclick="alert('test')">Alert Dialog</p>
      </div>
      <div class="button">
        <p class="smol" onclick="prompt('test')">Prompt Dialog</p>
      </div>
      <div class="button">
        <p class="smol" onclick="window.open('https://www.example.com', 'windowName', 'width=500,height=500')">Popup Window</p>
      </div>
      <div class="button">
        <p class="smol" onclick="document.body.contentEditable = 'true'; document.designMode = 'on'; void 0;">Toggle Edit Mode</p>
      </div>
      <div class="button">
        <p class="smol" onclick="window.location.href = 'https://www.example.com/';">Redirect</p>
      </div>
    </div>
    
   
  </body>
</html>
